<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <style>
        /* reset estrutura basica */
        body{
            font-family:Arial, Helvetica, sans-serif;
            margin:100px;
            padding:100px;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-container{
            background-color: #477247;
            border-radius:10px;
            box-shadow: 0 4px 6px rgba(16, 90, 41, 0.1);
            padding: 30px;
            width:100%;
            max-width: 400px;

        }

        h1{
            text-align: center;
            color: #b5dfa9;
            margin-bottom: 30px;
        }
        form{
            display: flex;
            flex-direction: column;
        }
        .form-group{
            margin-bottom: 20px;
        }
        label{
            font-weight: bold;
            margin-bottom: 5px;
            display: block;
        }
        input,
        textarea,
        select,
        button{
            width: 100%;
            padding:12px;
            margin-top: 5px;
            border: 1px solid #ffffff;
            font-size: 14px;
            box-sizing: border-box;
            background-color: #f0f8ff;
        }
        input[type="radio"],
        input[type="checkbox"]{
            display:inline-block;
            width: auto;
            margin-right: 10px;
        }
        button{
            background-color: #3aa843;
            color: white;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover{
            background-color: #458d45;
        }

        select,
        textarea{
            transition: border-color 0.3s;
        }
        input:focus,
        textarea:focus,
        select:focus{
            border-color: #8bc493;
            outline: none;
        }
        fieldset{
            border:none;
            padding: 0;
        }
        legend{
            font-weight:bold;
            margin-bottom: 10px;
        }
        .buttons{
            display:flex;
            justify-content: center;
        }
        
    </style>
</head>
<body>
    <div class="form-container">
        <h1>Formulário</h1>

        <form Method="POST" action="http://localhost:3003/usuarios">
            <input type="hidden" name="id" value="3">

            <div class="form-group">
                <label for="name">Nome</label>
                <input type="text" id="name" name="name" placeholder="Digite seu nome">
            </div>
            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" name="senha" id="senha" placeholder="Digite sua senha">
            </div>

            <div class="form-group">
                <label for="bio">Bio</label>
                <textarea name="bio" id="bio" cols="30" rows="10" placeholder="Conte um pouco sobre você"></textarea>
            </div>
            <fieldset class="form-group">
                <legend>Tipo de usuários</legend>
                <label for="admin">
                    <input type="radio" name="tipo" id="admin" value="admin">Admin
                </label>
                <label for="regular">
                    <input type="radio" name="tipo" id="regular" value="regular">Regular
                </label>
                <label for="professor">
                    <input type="radio" name="tipo" id="professor" value="professor">Professor
                </label>
            </fieldset>
            <div class="form-group">
                <label for="ativo">
                    <input type="checkbox" name="ativo" id="ativo"> Ativo
                </label>
            </div>

            <div class="form-group">
                <label for="estado">Estado</label>
                <select name="estado" id="estado">
                    <option value="">Selecione</option>
                    <option value="ac">Acre</option>
                    <option value="ba">Bahia</option>
                    <option value="ce">Ceara</option>
                    <option value="pr">Parana</option>
                    <option value="mg">Minas Gerais</option>
                    <option value="pa">Para</option>
                </select>
            </div>
            <div class="form-group">
                <label for="interesse">Interesses</label>
                <select name="interesse" id="interesse" multiple size="7">
                    <option value="js">Javascript</option>
                    <option value="java">Java</option>
                    <option value="php">PHP</option>
                    <option value="python">Python</option>
                    <option value="go">Go</option>
                    <option value="c">C</option>
                </select>
            </div>

            <div class="form-group button">
                <button type="submit">Incluir</button>
                <button formaction="http://localhost:3003/usuarios/3" type="submit"> Alterar
                </button>
            </div>
        </form>
    </div>
</body>
</html>
