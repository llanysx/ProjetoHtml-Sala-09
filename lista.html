<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: aliceblue;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        /* Cabeçalho principal */
        h1{
            font-size: 2.5rem;
            color:aqua;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }
        h2{
            font-size: 1.8rem;
            color:aquamarine;
            margin: 20px 0;
            text-transform: uppercase;
        }
        ol,ul,dl{
            margin: 0;
            padding:0;
            list-style-position: inside;
            width: 100%;
            max-width: 600px;
        }
        ol li ul li{
            background-color: #ffffff;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 1);
        }
        ol li:hover ,ul li:hover{
            transform: translateY(-5px);
            background-color: aquamarine;
            color: #ffffff;
        }
        /* Lista de Definição */
        dl dt{
            font-weight: bold;
            color:aquamarine;
            margin-top: 20px;
        }
        
    </style>
</head>
<body>
    <h1>Listas</h1>

    <!-- Lista ordenada -->
     <h2>Aprovados</h2>
     <ol>
        <li>Bia</li>
        <li>Pedro</li>
        <li>Ana</li>
        <li>João</li>
     </ol>
     <!-- Lista não ordenada -->
      <ul>
        <li>Queijo</li>
        <li>Leite</li>
        <li>Arroz</li>
        <li>Pão</li>
      </ul>
      <!-- Lista de definição -->
       <h2>Principais termos do glossário de Clound Coumputing</h2>
       <dl>
        <dt>BaaS</dt>
        <dd>Backend Como Serviço</dd>
        <dt>IaaS</dt>
        <dd>Infraestrutura Como Serviço</dd>
        <dt>SaaS</dt>
        <dd>Software Como Serviço</dd>
       </dl>
</body>
</html>
